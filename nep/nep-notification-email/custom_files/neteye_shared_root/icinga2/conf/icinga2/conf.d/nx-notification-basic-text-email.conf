const NxNotificationChannelTextEmail = "text-email"


template Notification "nx-nt-channel-text-email" {
        vars.notification_from = NxEmailNotificationFrom
        vars.nx_neteye_web_interface_fqdn = NxEmailNotificationMaster
        vars.nx_mail_gateway = NxEmailNotificationGateway
}

template Notification "nx-nt-channel-text-email-for-host" {
        import "nx-nt-channel-text-email"
        command = "nx-c-mail-text-host-notification"
}

template Notification "nx-nt-channel-text-email-for-service" {
        import "nx-nt-channel-text-email"
        command = "nx-c-mail-text-service-notification"

        vars.nx_notification_from_channel_override = (NxNotificationChannelTextEmail in service.vars.nx_notification_basic_channels_override)
}


# Rules for Host Notification

apply Notification "nx-n-basic-text-email-to-users-from-host" to Host {
        import "nx-nt-basic"
        import "nx-nt-channel-text-email-for-host"

        users = host.vars.nx_notification_basic_users

        assign where nx_is_notification_channel_enabled(NxNotificationChannelTextEmail, host.vars.nx_notification_basic_channels, null)
        ignore where !match("enabled_for_host*", host.vars.nx_notification_basic_mode_host)
        ignore where !(host.vars.nx_notification_basic_users)
}

apply Notification "nx-n-basic-text-email-to-groups-from-host" to Host {
        import "nx-nt-basic"
        import "nx-nt-channel-text-email-for-host"

        user_groups = host.vars.nx_notification_basic_groups

        assign where nx_is_notification_channel_enabled(NxNotificationChannelTextEmail, host.vars.nx_notification_basic_channels, null)
        ignore where !match("enabled_for_host*", host.vars.nx_notification_basic_mode_host)
        ignore where !(host.vars.nx_notification_basic_groups)
}


# Rules for Service Notification

apply Notification "nx-n-basic-text-email-to-users-from-service" to Service {
        import "nx-nt-basic"
        import "nx-nt-channel-text-email-for-service"

        if (service.vars.nx_notification_basic_users_override) {
                vars.nx_notification_use_users_override = true
                users = service.vars.nx_notification_basic_users_override
        } else {
                vars.nx_notification_use_users_override = false
                users = host.vars.nx_notification_basic_users
        }

        assign where nx_is_notification_channel_enabled(NxNotificationChannelTextEmail, host.vars.nx_notification_basic_channels, service.vars.nx_notification_basic_channels_override)
        ignore where !(match("enabled_for_*services", host.vars.nx_notification_basic_mode_host))
        ignore where !(match ("enabled", service.vars.nx_notification_basic_mode_service))
        ignore where !(host.vars.nx_notification_basic_users) && !(service.vars.nx_notification_basic_users_override)
}

apply Notification "nx-n-basic-text-email-to-groups-from-service" to Service {
        import "nx-nt-basic"
        import "nx-nt-channel-text-email-for-service"

        if (service.vars.nx_notification_basic_groups_override) {
                vars.nx_notification_use_groups_override = true
                user_groups = service.vars.nx_notification_basic_groups_override
        } else {
                vars.nx_notification_use_groups_override = false
                user_groups = host.vars.nx_notification_basic_groups
        }

        assign where nx_is_notification_channel_enabled(NxNotificationChannelTextEmail, host.vars.nx_notification_basic_channels, service.vars.nx_notification_basic_channels_override)
        ignore where !(match("enabled_for_*services", host.vars.nx_notification_basic_mode_host))
        ignore where !(match ("enabled", service.vars.nx_notification_basic_mode_service))
        ignore where !(host.vars.nx_notification_basic_groups) && !(service.vars.nx_notification_basic_groups_override)
}

name: Validate NEP Scope

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
   contents: read

jobs:
  validate-nep-scope:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Validate NEP changes
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")

          echo "Changed files:"
          echo "$files"

          matching_dirs=$(
            echo "$files" |
            awk '
              /^nep\/setup\// {
                print "nep/setup"
                next
              }
              /^nep\/nep-[^\/]+\// {
                match($0, /^nep\/nep-[^\/]+/)
                print substr($0, RSTART, RLENGTH)
              }
            ' |
            sort -u
          )

          count=$(echo "$matching_dirs" | sed '/^$/d' | wc -l)

          echo
          echo "Modified NEP directories:"
          echo "$matching_dirs"
          echo
          echo "Count: $count"

          if [ "$count" -gt 1 ]; then
            echo "::error::PR modifies more than one NEP directory"
            exit 1
          fi

          echo "Validation passed."
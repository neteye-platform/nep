# this should be a 64bit server if executing build_rpm.sh on a 32bit machine
REMOTE_BUILD_SERVER=10.62.7.196
REMOTE_TMP_PATH=/tmp

# deploy variables
DOWNLOAD_URL=https://developers.wuerth-phoenix.com/static/downloads/
FOLDER_32=centos5-i386
FOLDER_64=centos6-x86_64
const NxNotificationChannelServiceNow = "servicenow"


template Notification "nx-nt-channel-servicenow" {
}

template Notification "nx-nt-channel-servicenow-for-host" {
        import "nx-nt-channel-servicenow"
        command = "nx-c-servicenow-host-notification"
}

template Notification "nx-nt-channel-servicenow-for-service" {
        import "nx-nt-channel-servicenow"
        command = "nx-c-servicenow-service-notification"

        vars.nx_notification_from_channel_override = (NxNotificationChannelServiceNow in service.vars.nx_notification_basic_channels_override)
}


